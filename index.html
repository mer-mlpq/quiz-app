<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>QUIZ time</title>
  </head>
  <body>
    <div class="container">
      <ul class="status-bar">
        <li class="status-item"></li>
        <li class="status-item"></li>
        <li class="status-item"></li>
        <li class="status-item"></li>
      </ul>
      <h3 class="question-num">Question 1 of 4</h3>
      <h2 class="subject">Subject</h2>
      <p class="question">The question will be written here.</p>
      <ul class="choices">
        <li><button class="choice-item">Choice1</button></li>
        <li><button class="choice-item">Choice2</button></li>
        <li><button class="choice-item">Choice3</button></li>
        <li><button class="choice-item">Choice4</button></li>
      </ul>
      <div class="controls">
        <button class="next-btn" disabled>Next</button>
        <button class="skip-btn">Skip</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
